name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate packed packages
        run: pnpm validate:packages:built

      - name: Validate registry consumers
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm validate:registry:built --since=origin/main
          else
            pnpm validate:registry:built
          fi

      - name: Validate Changesets status
        run: |
          if [[ "${{ github.head_ref }}" == "changeset-release/main" ]]; then
            echo "Version PR is validated by the post-version release-scope check"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm changeset:status --since=origin/main
          else
            pnpm changeset:status
          fi

      - name: Validate foundation release scope
        run: |
          if [[ "${{ github.head_ref }}" == "changeset-release/main" ]]; then
            pnpm validate:release-scope --versioned
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            pnpm validate:release-scope --since=origin/main
          else
            pnpm validate:release-scope
          fi
